---
repos:
  - repo: https://github.com/MarketSquare/robotframework-robocop
    rev: v6.0.0
    hooks:
      - id: robocop
      - id: robocop-format
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.5
    hooks:
      - id: shellcheck
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: [--strict]
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run --directory runner pytest
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy-runner
        name: mypy (runner)
        entry: uv run --directory runner mypy .
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-format-runner
        name: ruff format (runner)
        entry: uv run --directory runner ruff format --check
          ubuntu_gui_testing_runner
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-check-runner
        name: ruff check (runner)
        entry: uv run --directory runner ruff check
        language: system
        pass_filenames: false
        stages: [pre-commit]
