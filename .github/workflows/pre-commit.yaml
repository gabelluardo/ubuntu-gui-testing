---
name: pre-commit
on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: pre-commit
        run: |
          sudo apt install -y pre-commit git
          sudo apt install python3-libvirt libvirt-dev libpython3-dev
          pre-commit run --all-files
